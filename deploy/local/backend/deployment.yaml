apiVersion: apps/v1
kind: Deployment
metadata:
  name: kvcdn-api
  namespace: kvcdn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kvcdn-api
  template:
    metadata:
      labels:
        app: kvcdn-api
    spec:
      containers:
        - name: api
          image: localhost:5001/kvcdn-api:local
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: kvcdn-api-config
            - secretRef:
                name: kvcdn-api-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 1000m
